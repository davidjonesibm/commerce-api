# =============================================================================
# Docker Compose — Commerce API Development Environment
# =============================================================================
#
# WHAT THIS FILE DOES:
#   Defines two services (containers) that work together:
#     1. A PostgreSQL 16 database (db)
#     2. A .NET 9 API application (api)
#
# HOW TO USE:
#   Start everything:          docker compose up -d
#   Start and rebuild:         docker compose up -d --build
#   View logs:                 docker compose logs -f
#   Stop everything:           docker compose down
#   Stop and delete data:      docker compose down -v   (destroys database!)
#
# MODERN FORMAT:
#   This file omits the legacy `version:` key. Docker Compose v2 (the
#   `docker compose` CLI plugin) no longer requires it. If you see older
#   tutorials with `version: "3.8"`, that syntax is deprecated.
# =============================================================================

# -----------------------------------------------------------------------------
# SERVICES — each service becomes a running container
# -----------------------------------------------------------------------------
services:
  # ---------------------------------------------------------------------------
  # DATABASE SERVICE
  # ---------------------------------------------------------------------------
  db:
    # IMAGE: The Docker image to use. We pin to a specific major version
    # (postgres:16-alpine) rather than using `latest` so builds are
    # reproducible. Alpine Linux variants are ~5 MB vs ~120 MB for Debian.
    image: postgres:16-alpine

    # CONTAINER NAME: Gives the container a predictable name instead of a
    # random one. Makes it easier to reference in `docker logs`, `docker exec`.
    container_name: commerce-db

    # RESTART POLICY: "unless-stopped" means Docker will auto-restart this
    # container if it crashes or the host reboots — but it respects manual
    # `docker stop` commands. Ideal for infrastructure services like databases.
    restart: unless-stopped

    # ENVIRONMENT VARIABLES: Configure PostgreSQL. These are read from the
    # `.env` file in the same directory (Docker Compose auto-loads `.env`).
    #
    # SECURITY NOTE: For a real production setup, you would use Docker secrets
    # (mounted files at /run/secrets/) instead of environment variables.
    # Environment variables can leak via `docker inspect` or crash dumps.
    # For local development, .env files are acceptable.
    environment:
      # POSTGRES_USER: The superuser account created on first startup.
      POSTGRES_USER: ${POSTGRES_USER}
      # POSTGRES_PASSWORD: Password for the superuser. Required by PostgreSQL.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # POSTGRES_DB: The default database created on first startup.
      # Our init script (01-schema.sql) creates tables inside this database.
      POSTGRES_DB: ${POSTGRES_DB}

    # PORTS: Maps host:container ports. We use 5433 on the host to avoid
    # conflicts with any local PostgreSQL installation (which defaults to 5432).
    # Inside the container, PostgreSQL still listens on its default port 5432.
    #
    # Format: "HOST_PORT:CONTAINER_PORT"
    ports:
      - '5433:5432'

    # VOLUMES: Persist and initialize data.
    volumes:
      # Named volume: Stores PostgreSQL data files. Without this, all data
      # would be lost when the container is removed. Named volumes are managed
      # by Docker and survive container recreation.
      - postgres-data:/var/lib/postgresql/data

      # Bind mount: PostgreSQL's official image automatically runs any .sql
      # or .sh files in /docker-entrypoint-initdb.d/ on FIRST startup only
      # (when the data directory is empty). This is how we create our tables
      # and seed data without manual intervention.
      - ./db/init/:/docker-entrypoint-initdb.d/

    # HEALTHCHECK: Periodically tests whether PostgreSQL is ready to accept
    # connections. Other services can use `depends_on: condition: service_healthy`
    # to wait for this check to pass before starting.
    #
    # pg_isready is a utility bundled with PostgreSQL that checks if the server
    # is accepting connections. It exits 0 (healthy) or 1 (unhealthy).
    healthcheck:
      test:
        ['CMD', 'pg_isready', '-U', '${POSTGRES_USER}', '-d', '${POSTGRES_DB}']
      # interval: How often to run the health check.
      interval: 10s
      # timeout: Max time for a single check before it's considered failed.
      timeout: 5s
      # retries: How many consecutive failures before the container is "unhealthy".
      retries: 5
      # start_period: Grace period during startup — failures here don't count.
      # PostgreSQL needs time to initialize, especially on first run with init scripts.
      start_period: 30s

    # NETWORKS: Attach this service to our custom bridge network.
    # Services on the same network can discover each other by service name
    # (e.g., the API can connect to "db" as a hostname).
    networks:
      - commerce-net

  # ---------------------------------------------------------------------------
  # API SERVICE
  # ---------------------------------------------------------------------------
  api:
    # BUILD: Instead of pulling a pre-built image, build from our Dockerfile.
    # "context" is the directory sent to the Docker daemon (the build context).
    # "dockerfile" is the path to the Dockerfile relative to the context.
    build:
      context: .
      dockerfile: commerceApi/Dockerfile

    # CONTAINER NAME: Predictable name for easy identification.
    container_name: commerce-api

    # RESTART POLICY: Restart on crashes, but respect manual stops.
    restart: unless-stopped

    # PORTS: Maps host port 5032 to container port 8080.
    # .NET 8+ containers default to listening on port 8080 (non-root).
    # We expose 5032 on the host to match the existing launchSettings.json.
    #
    # Format: "HOST_PORT:CONTAINER_PORT"
    ports:
      - '5032:8080'

    # ENVIRONMENT: Runtime configuration for the API container.
    environment:
      # CONNECTION_STRING: How the API connects to PostgreSQL.
      # Note the host is "db" — this is the service name, resolved via Docker DNS.
      # The port is 5432 (the container's internal port), NOT 5433 (the host port).
      ConnectionStrings__DefaultConnection: ${CONNECTION_STRING}
      # Tell ASP.NET Core to run in Development mode for detailed errors.
      ASPNETCORE_ENVIRONMENT: Development

    # DEPENDS_ON: Control startup order.
    # `condition: service_healthy` means the API container won't start until
    # the db container's healthcheck passes. This prevents the API from
    # crashing because it can't connect to a database that isn't ready yet.
    #
    # Without `condition`, Docker only waits for the container to START,
    # not for PostgreSQL to be READY — a common source of startup failures.
    depends_on:
      db:
        condition: service_healthy

    # NETWORKS: Same network as the database so they can communicate.
    networks:
      - commerce-net

# -----------------------------------------------------------------------------
# VOLUMES — named volumes managed by Docker
# -----------------------------------------------------------------------------
# Named volumes persist data independently of containers. Even if you
# `docker compose down`, the volume survives. Use `docker compose down -v`
# to explicitly remove volumes (and all data!).
volumes:
  postgres-data:
    # driver: local means Docker manages the volume on the host filesystem.
    # This is the default, but being explicit is clearer for learning.
    driver: local

# -----------------------------------------------------------------------------
# NETWORKS — custom bridge networks for container communication
# -----------------------------------------------------------------------------
# By default, Docker Compose creates a network for your project, but defining
# one explicitly gives you control over naming and configuration.
#
# User-defined bridge networks provide:
#   - DNS resolution: containers find each other by service name ("db", "api")
#   - Isolation: only containers on this network can communicate
#   - No manual IP management: Docker handles IP assignment
networks:
  commerce-net:
    driver: bridge
